<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการบ้าน ธีมภูเขา (Mountain To-Do SPA)</title>
    <style>
        /* ==========================================
           1. ตัวแปรสีและธีมภูเขา (CSS Variables & Mountain Themes)
           ========================================== */
        :root {
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.9); /* การ์ดโปร่งแสงเล็กน้อยให้เห็นพื้นหลัง */
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #dcdde1;
            --primary-color: #34495e;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            
            /* สีสำหรับเลเยอร์ภูเขาโหมดสว่าง */
            --sky-bg: linear-gradient(to bottom, #e0f2fe, #f0f4f8);
            --mountain-back: #cbd5e1;
            --mountain-mid: #94a3b8;
            --mountain-front: #64748b;
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --card-bg: rgba(45, 55, 72, 0.9);
            --text-color: #f7fafc;
            --text-muted: #a0aec0;
            --border-color: #4a5568;
            --primary-color: #cbd5e0;
            --success-color: #2ee571;
            
            /* สีสำหรับเลเยอร์ภูเขาโหมดมืด */
            --sky-bg: linear-gradient(to bottom, #0f172a, #1e293b);
            --mountain-back: #334155;
            --mountain-mid: #475569;
            --mountain-front: #1e293b;
        }

        /* ==========================================
           2. การจัดสไตล์พื้นฐานและพื้นหลังเลเยอร์ภูเขา
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.4s ease;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* ส่วนหัวที่เป็นภาพวิวภูเขา (Mountain CSS Artwork Header) */
        .mountain-header {
            background: var(--sky-bg);
            height: 250px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-bottom: 4px solid var(--mountain-front);
        }

        /* วาดภูเขาเลเยอร์หลังสุด */
        .mountain-header::before {
            content: "";
            position: absolute;
            bottom: -20px; left: -10%; width: 60%; height: 150px;
            background: var(--mountain-back);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.7;
        }

        /* วาดภูเขาเลเยอร์กลางและหน้าสุด */
        .mountain-art {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* ภูเขาลูกกลาง */
        .mountain-art::before {
            content: "";
            position: absolute;
            bottom: -10px; right: -5%; width: 70%; height: 180px;
            background: var(--mountain-mid);
            clip-path: polygon(40% 0%, 0% 100%, 100% 100%);
            opacity: 0.8;
        }

        /* ภูเขาลูกหน้าสุด */
        .mountain-art::after {
            content: "";
            position: absolute;
            bottom: 0; left: 20%; width: 65%; height: 120px;
            background: var(--mountain-front);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .header-content {
            position: relative;
            z-index: 10; /* ดันตัวหนังสือให้อยู่เหนือภาพภูเขา */
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }

        .header-content h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        /* ==========================================
           3. โครงสร้าง Layout และแดชบอร์ด
           ========================================== */
        .container {
            max-width: 1200px;
            margin: -40px auto 0 auto; /* ให้กล่องแดชบอร์ดเกยขึ้นไปบนวิวภูเขาเล็กน้อย */
            padding: 0 20px;
            position: relative;
            z-index: 20;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(5px); /* เอฟเฟกต์กระจกฝ้าเห็นภูเขาด้านหลังจางๆ */
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-3px); }
        .card h3 { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 8px; }
        .card .value { font-size: 2rem; font-weight: bold; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .container { margin-top: -20px; }
        }

        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-bottom: 15px;
            font-size: 1.25rem;
            border-left: 5px solid var(--mountain-front);
            padding-left: 10px;
        }

        /* ==========================================
           4. ฟอร์มป้อนข้อมูลและการค้นหา
           ========================================== */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; }
        input, select {
            width: 100%; padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 0.95rem;
        }

        button {
            cursor: pointer; padding: 10px 20px;
            border: none; border-radius: 6px;
            font-weight: bold; transition: 0.2s;
        }

        .btn-theme { background: var(--mountain-front); color: white; }
        .btn-block { width: 100%; background: #2ecc71; color: white; font-size: 1rem; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-warning { background: var(--warning-color); color: #2c3e50; }

        /* ==========================================
           5. รายการงาน (Task Items Style)
           ========================================== */
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item {
            background: var(--card-bg);
            border-left: 6px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .priority-high { border-left-color: var(--danger-color); }
        .priority-medium { border-left-color: var(--warning-color); }
        .priority-low { border-left-color: var(--success-color); }

        .task-info h4 { margin-bottom: 6px; font-size: 1.1rem; }
        .task-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 8px; }
        
        .badge {
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold;
        }
        .badge-subject { background: #e0f2fe; color: #0369a1; }
        [data-theme="dark"] .badge-subject { background: #0369a1; color: #e0f2fe; }
        .badge-status { background: #e2e8f0; color: #334155; }

        .task-actions { display: flex; gap: 6px; }
        .task-actions button { padding: 6px 12px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header class="mountain-header">
        <div class="mountain-art"></div>
        <div class="header-content">
            <h1>⛰️ สุมหัวทำการบ้าน (Mountain To-Do)</h1>
            <p style="margin-bottom: 15px;">ระบบจัดการการบ้านและแผนงานประจำวันสำหรับนักเรียน</p>
            <button class="btn-theme" onclick="toggleTheme()">เปลี่ยนโหมดกลางวัน/กลางคืน 🌙 ☀️</button>
        </div>
    </header>

    <div class="container">
        <section class="dashboard">
            <div class="card"><h3>งานทั้งหมดในระบบ</h3><div class="value" id="dashTotal" style="color: var(--mountain-front);">0</div></div>
            <div class="card"><h3>📝 ยังไม่ได้ทำ</h3><div class="value" id="dashPending" style="color: var(--warning-color);">0</div></div>
            <div class="card"><h3>✅ ทำเสร็จแล้ว</h3><div class="value" id="dashCompleted" style="color: var(--success-color);">0</div></div>
            <div class="card"><h3>🚨 งานด่วน (ใน 3 วัน)</h3><div class="value" id="dashUrgent" style="color: var(--danger-color);">0</div></div>
        </section>

        <div class="main-layout">
            
            <aside>
                <div class="panel">
                    <h2 id="formTitle">บันทึกภารกิจใหม่</h2>
                    <form id="taskForm" onsubmit="saveTask(event)">
                        <input type="hidden" id="taskId"> <div class="form-group">
                            <label for="taskName">ชื่อชิ้นงาน / รายละเอียด *</label>
                            <input type="text" id="taskName" required placeholder="เช่น ทำรายงานวิชาวิทยาศาสตร์">
                        </div>
                        <div class="form-group">
                            <label for="subject">รายวิชา *</label>
                            <input type="text" id="subject" required placeholder="เช่น วิทยาการคำนวณ, คณิตศาสตร์">
                        </div>
                        <div class="form-group">
                            <label for="dueDate">วันที่ต้องส่งงาน *</label>
                            <input type="date" id="dueDate" required>
                        </div>
                        <div class="form-group">
                            <label for="priority">ระดับความเร่งด่วน</label>
                            <select id="priority">
                                <option value="low">ต่ำ (สีเขียว)</option>
                                <option value="medium" selected>ปานกลาง (สีเหลือง)</option>
                                <option value="high">สูง (สีแดง)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="status">สถานะปัจจุบัน</label>
                            <select id="status">
                                <option value="pending">ยังไม่ทำ</option>
                                <option value="processing">กำลังทำ</option>
                                <option value="completed">เสร็จสิ้นแล้ว</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-block" id="btnSubmit">💾 บันทึกข้อมูล</button>
                        <button type="button" class="btn-block btn-danger" id="btnCancelEdit" style="display:none; margin-top:5px;" onclick="resetForm()">ยกเลิกการแก้ไข</button>
                    </form>
                </div>

                <div class="panel">
                    <h2>🔎 ค้นหาและกรองข้อมูล</h2>
                    <div class="form-group">
                        <label for="searchName">พิมพ์คำค้นหาชื่องาน</label>
                        <input type="text" id="searchName" placeholder="พิมพ์ชื่องานที่นี่..." oninput="render()">
                    </div>
                    <div class="form-group">
                        <label for="filterSubject">คัดแยกตามรายวิชา</label>
                        <select id="filterSubject" onchange="render()"><option value="">แสดงทุกวิชา</option></select>
                    </div>
                    <div class="form-group">
                        <label for="filterStatus">คัดแยกตามสถานะ</label>
                        <select id="filterStatus" onchange="render()">
                            <option value="">แสดงทั้งหมด</option>
                            <option value="pending">ยังไม่ทำ</option>
                            <option value="processing">กำลังทำ</option>
                            <option value="completed">เสร็จสิ้นแล้ว</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filterPriority">คัดแยกตามความสำคัญ</label>
                        <select id="filterPriority" onchange="render()">
                            <option value="">แสดงทั้งหมด</option>
                            <option value="low">ต่ำ</option>
                            <option value="medium">ปานกลาง</option>
                            <option value="high">สูง</option>
                        </select>
                    </div>
                </div>
            </aside>

            <main class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h2>📋 รายการงาน (เรียงตามกำหนดส่งด่วนที่สุด)</h2>
                    <button class="btn-danger" onclick="clearCompleted()">🧹 ล้างงานที่เสร็จแล้วทั้งหมด</button>
                </div>
                <div id="taskList" class="task-list"></div>
            </main>

        </div>
    </div>

    <script>
        // ทำการดึงข้อมูลจาก Local Storage ถ้าไม่มีให้กำหนดเป็นอาร์เรย์ว่างเพื่อเตรียมเก็บอ็อบเจกต์งาน
        let tasks = JSON.parse(localStorage.getItem('mountain_todo_tasks')) || [];

        // ฟังก์ชันที่จะทำงานทันทีเมื่อบราวเซอร์โหลดโครงสร้างหน้าเว็บเสร็จสิ้น
        window.onload = function() {
            // ตรวจสอบและดึงธีมเก่าที่ผู้ใช้เลือกบันทึกไว้ในเครื่อง
            if(localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            render(); // สั่งให้ประมวลผลวาดข้อมูลขึ้นจอ
        };

        // ฟังก์ชันเปลี่ยนโหมดการทำงานสลับ สว่าง/มืด (Light/Dark Mode)
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // ฟังก์ชันเซฟข้อมูลเมื่อมีการกดปุ่มส่งฟอร์ม (รองรับทั้งสร้างใหม่และอัปเดตงานเดิม)
        function saveTask(event) {
            event.preventDefault(); // ระงับการรีเฟรชหน้าเว็บที่เป็นพฤติกรรมดั้งเดิมของฟอร์ม

            const id = document.getElementById('taskId').value;
            const name = document.getElementById('taskName').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const dueDate = document.getElementById('dueDate').value;
            const priority = document.getElementById('priority').value;
            const status = document.getElementById('status').value;

            if (id) {
                // หากมี ID อยู่เดิมแล้ว แสดงว่ากำลังทำงานในโหมด "แก้ไขข้อมูล"
                const index = tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    tasks[index] = { id, name, subject, dueDate, priority, status };
                }
            } else {
                // หากไม่มี ID เดิมอยู่ แสดงว่าเป็นกรณี "เพิ่มงานใหม่เข้าสู่ระบบ"
                const newTask = {
                    id: Date.now().toString(), // ปั๊มรหัสไม่ซ้ำกันโดยใช้ตัวเลขหน่วยมิลลิวินาทีของเวลาปัจจุบัน
                    name, subject, dueDate, priority, status
                };
                tasks.push(newTask);
            }

            saveToLocalStorage(); // นำตัวแปรอาร์เรย์ล่าสุดไปบันทึกไว้ในเบราวเซอร์
            resetForm();          // สั่งล้างข้อมูลบนกล่องป้อนงาน
            render();             // อัปเดตข้อมูลแสดงผลใหม่บนหน้าเว็บ
        }

        // ฟังก์ชันลบงานแบบระบุไอดีเจาะจงชิ้น
        function deleteTask(id) {
            if(confirm('น้อง ๆ ยืนยันที่จะลบรายการงานชิ้นนี้ใช่ไหมครับ?')) {
                tasks = tasks.filter(task => task.id !== id);
                saveToLocalStorage();
                render();
            }
        }

        // ฟังก์ชันล้างงานที่ผู้ใช้เปลี่ยนสถานะเป็นสำเร็จเรียบร้อยแล้วทั้งหมดออกจากระบบ
        function clearCompleted() {
            if(confirm('น้อง ๆ ยืนยันที่จะลบงานที่ "เสร็จสิ้นแล้ว" ทั้งหมดออกใช่ไหมครับ?')) {
                tasks = tasks.filter(task => task.status !== 'completed');
                saveToLocalStorage();
                render();
            }
        }

        // ฟังก์ชันปรับเปลี่ยนสถานะของงานด่วนผ่านการกดคลิกปุ่มสถานะลัดในแต่ละแถว
        function quickChangeStatus(id, newStatus) {
            const index = tasks.findIndex(t => t.id === id);
            if (index !== -1) {
                tasks[index].status = newStatus;
                saveToLocalStorage();
                render();
            }
        }

        // ฟังก์ชันคัดลอกข้อมูลชิ้นงานเก่าดึงกลับไปป้อนลงใน Input Form เพื่อเตรียมให้ผู้ใช้แก้ไข
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskName').value = task.name;
                document.getElementById('subject').value = task.subject;
                document.getElementById('dueDate').value = task.dueDate;
                document.getElementById('priority').value = task.priority;
                document.getElementById('status').value = task.status;

                // เปลี่ยนข้อความบนปุ่มและหัวข้อฟอร์มเพื่อแสดงถึงสถานะการแก้ไข
                document.getElementById('formTitle').innerText = '✏️ แก้ไขรายละเอียดงาน';
                document.getElementById('btnSubmit').innerText = '⚡ อัปเดตข้อมูลงาน';
                document.getElementById('btnCancelEdit').style.display = 'block';
            }
        }

        // ฟังก์ชันล้างค่าในฟอร์มเพื่อดึงฟอร์มกลับมาสู่สถานะพร้อมป้อนงานชิ้นใหม่
        function resetForm() {
            document.getElementById('taskId').value = '';
            document.getElementById('taskForm').reset();
            document.getElementById('formTitle').innerText = 'บันทึกภารกิจใหม่';
            document.getElementById('btnSubmit').innerText = '💾 บันทึกข้อมูล';
            document.getElementById('btnCancelEdit').style.display = 'none';
        }

        // ฟังก์ชันจัดการบันทึกข้อมูลแปลงจากอ็อบเจกต์เป็นสตริงข้อความเก็บลงหน่วยความจำ Local Storage
        function saveToLocalStorage() {
            localStorage.setItem('mountain_todo_tasks', JSON.stringify(tasks));
        }

        // ฟังก์ชันตรวจสอบวิชาทั้งหมดในอาเรย์เพื่อดึงวิชาที่ไม่ซ้ำกันไปจัดทำเป็นตัวเลือกตัวกรองวิชา
        function updateSubjectFilterOptions() {
            const filterSelect = document.getElementById('filterSubject');
            const currentSelected = filterSelect.value;
            
            // ใช้ความสามารถของ Set Object เพื่อรวบรวมชื่อวิชาทั้งหมดโดยตัดตัวซ้ำทิ้งโดยอัตโนมัติ
            const subjects = [...new Set(tasks.map(t => t.subject))];
            
            filterSelect.innerHTML = '<option value="">แสดงทุกวิชา</option>';
            subjects.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.innerText = sub;
                filterSelect.appendChild(opt);
            });
            
            filterSelect.value = currentSelected; // คงสภาพวิชาที่เลือกค้างไว้ก่อนหน้า
        }

        // ฟังก์ชันสแกนชุดข้อมูลเพื่อประมวลผลคำนวณและแสดงค่าสถิติขึ้นตัวเลขบน แดชบอร์ด (Dashboard)
        function updateDashboard() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const pending = total - completed;

            // ค้นหางานด่วน: คืองานที่ยังไม่ทำ และ มีวันครบกำหนดส่งภายในช่วงเวลา 3 วันนับจากวันนี้
            const today = new Date();
            today.setHours(0,0,0,0);
            const threeDaysLater = new Date(today.getTime() + (3 * 24 * 60 * 60 * 1000));

            const urgent = tasks.filter(t => {
                if (t.status === 'completed') return false;
                const taskDate = new Date(t.dueDate);
                return taskDate >= today && taskDate <= threeDaysLater;
            }).length;

            // แทนค่าตัวเลขที่คำนวณได้ลงไปยัง Elements แต่ละตัวบนหน้ากระดาน
            document.getElementById('dashTotal').innerText = total;
            document.getElementById('dashPending').innerText = pending;
            document.getElementById('dashCompleted').innerText = completed;
            document.getElementById('dashUrgent').innerText = urgent;
        }

        // ฟังก์ชันหลักที่ทำหน้าที่คัดกรอง เรียงลำดับ และทำการเรนเดอร์โครงสร้าง HTML รายการงาน
        function render() {
            updateDashboard();              // คำนวณสถิติใหม่
            updateSubjectFilterOptions();   // อัปเดตตัวเลือกรายวิชา

            const listContainer = document.getElementById('taskList');
            
            // ดึงค่าปัจจัยจากอินพุตตัวกรองที่ผู้ใช้ป้อนเลือกไว้มาใช้ในการกรองข้อมูล
            const searchKeyword = document.getElementById('searchName').value.toLowerCase();
            const filterSub = document.getElementById('filterSubject').value;
            const filterStat = document.getElementById('filterStatus').value;
            const filterPrior = document.getElementById('filterPriority').value;

            // 1. ขั้นตอนการกรองข้อมูล (Data Filtering) ตามเงื่อนไขทุกลักษณะพร้อมกัน
            let filteredTasks = tasks.filter(task => {
                const matchSearch = task.name.toLowerCase().includes(searchKeyword);
                const matchSubject = filterSub === '' || task.subject === filterSub;
                const matchStatus = filterStat === '' || task.status === filterStat;
                const matchPriority = filterPrior === '' || task.priority === filterPrior;
                return matchSearch && matchSubject && matchStatus && matchPriority;
            });

            // 2. ขั้นตอนการจัดเรียงลำดับข้อมูล (Data Sorting) เปรียบเทียบวันเวลากำหนดส่ง โดยส่งก่อนขึ้นก่อน
            filteredTasks.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            // เคลียร์ผลลัพธ์การวาดเดิมในคอนเทนเนอร์ทิ้งเพื่อเตรียมพิมพ์ชุดข้อมูลชุดใหม่
            listContainer.innerHTML = '';

            if (filteredTasks.length === 0) {
                listContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:30px;">🌲 ไม่มีภารกิจหรือการบ้านที่ตรงตามเงื่อนไขการค้นหาของคุณ</p>';
                return;
            }

            // 3. ขั้นตอนการสร้าง HTML Elements เพื่อจัดแสดงงานแต่ละชิ้นลงไปบนจอภาพ
            filteredTasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `task-item priority-${task.priority}`;

                let statusThaiText = 'ยังไม่ทำ';
                if(task.status === 'processing') statusThaiText = 'กำลังทำ';
                if(task.status === 'completed') statusThaiText = 'เสร็จสิ้นแล้ว';

                item.innerHTML = `
                    <div class="task-info">
                        <h4>${task.name}</h4>
                        <div class="task-meta">
                            <span class="badge badge-subject">📚 ${task.subject}</span>
                            <span class="badge badge-status">สถานะ: ${statusThaiText}</span>
                            <span>📅 กำหนดส่ง: ${task.dueDate}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        ${task.status !== 'completed' ? `<button class="btn-warning" onclick="quickChangeStatus('${task.id}', 'completed')">✓ เสร็จ</button>` : ''}
                        ${task.status === 'pending' ? `<button style="background: #3498db; color:white;" onclick="quickChangeStatus('${task.id}', 'processing')">⚡ ทำอยู่</button>` : ''}
                        
                        <button class="btn-theme" onclick="editTask('${task.id}')">✏️</button>
                        <button class="btn-danger" onclick="deleteTask('${task.id}')">🗑️</button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
